<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin Login — Predictor 4.0</title>
<style>
@font-face{font-family:'Orbitron';font-weight:700;font-display:swap;src:url('https://fonts.gstatic.com/s/orbitron/v35/yMJMMIlzdpvBhQQL_SC3X9yhF25-T1ny_CmBoWg2.ttf') format('truetype')}
@font-face{font-family:'Rajdhani';font-weight:600;font-display:swap;src:url('https://fonts.gstatic.com/s/rajdhani/v17/LDI2apCSOBg7S-QT7pbYF_OreeI.ttf') format('truetype')}
*{margin:0;padding:0;box-sizing:border-box}
:root{--pg:#00ff41;--ddb:#050807;--db:#0a0e0d;--gg:rgba(0,255,65,.5);--b:rgba(0,255,65,.18);--ar:#ff0033;--tg:#6a9070;--tw:#e0f0e4}
body{font-family:Rajdhani,sans-serif;background:var(--ddb);color:var(--tw);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.bg{position:fixed;inset:0;background:radial-gradient(circle at 50% 30%,rgba(0,255,65,.04) 0%,transparent 60%);z-index:0}
.grid{position:fixed;inset:0;background-image:linear-gradient(rgba(0,255,65,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,65,.03) 1px,transparent 1px);background-size:50px 50px;z-index:0}
.card{position:relative;z-index:1;background:var(--db);border:1px solid var(--b);padding:48px 40px;max-width:420px;width:100%;box-shadow:0 0 60px rgba(0,255,65,.06)}
.logo{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:32px}
.logo-img{width:48px;height:48px;filter:drop-shadow(0 0 10px var(--gg))}
.logo-title{font-family:Orbitron,sans-serif;font-size:18px;font-weight:700;color:var(--pg);line-height:1.2}
.logo-sub{font-size:10px;color:var(--tg);letter-spacing:2px;margin-top:2px}
h1{font-family:Orbitron,sans-serif;font-size:20px;font-weight:900;color:var(--pg);text-align:center;margin-bottom:8px}
.subtitle{text-align:center;color:var(--tg);font-size:12px;letter-spacing:1px;margin-bottom:32px}
.f-row{margin-bottom:18px}
.f-row label{display:block;font-size:10px;font-weight:700;color:var(--tg);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.f-row input{width:100%;background:rgba(0,0,0,.5);border:1px solid var(--b);padding:13px 16px;color:var(--tw);font-family:Rajdhani,sans-serif;font-size:15px;font-weight:600;outline:none;transition:.2s}
.f-row input:focus{border-color:var(--pg);box-shadow:0 0 0 2px rgba(0,255,65,.1)}
.error-msg{background:rgba(255,0,51,.08);border:1px solid rgba(255,0,51,.3);color:var(--ar);padding:12px 16px;font-size:12px;font-weight:600;margin-bottom:18px;display:{% if error %}block{% else %}none{% endif %}}
.btn-login{width:100%;padding:15px;font-family:Orbitron,sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;background:var(--pg);color:var(--ddb);border:none;cursor:pointer;transition:.2s;margin-top:8px}
.btn-login:hover{filter:brightness(1.1);transform:translateY(-1px)}
.btn-login:disabled{opacity:.5;cursor:not-allowed;transform:none}
.security-note{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:20px;font-size:10px;color:var(--tg);letter-spacing:1px}
</style>
</head>
<body>
<div class="bg"></div>
<div class="grid"></div>
<div class="card">
  <div class="logo">
    <img src="/website/assets/images/logo.png" alt="Logo" class="logo-img" onerror="this.style.display='none'">
    <div>
      <div class="logo-title">PREDICTOR 4.0</div>
      <div class="logo-sub">ADMIN CONTROL PANEL</div>
    </div>
  </div>
  <h1>ADMIN LOGIN</h1>
  <p class="subtitle">SECURE ACCESS · AUTHORIZED ONLY</p>

  {% if error %}
  <div class="error-msg">{{ error }}</div>
  {% endif %}

  <form method="POST" action="/admin/login" id="loginForm">
    <div class="f-row">
      <label>Username</label>
      <input type="text" name="username" placeholder="Enter username" autocomplete="off" required {% if locked %}disabled{% endif %}>
    </div>
    <div class="f-row">
      <label>Password</label>
      <input type="password" name="password" placeholder="Enter password" required {% if locked %}disabled{% endif %}>
    </div>
    <div class="f-row">
      <label>Your Telegram Chat ID</label>
      <input type="text" name="chat_id" placeholder="e.g. 123456789" autocomplete="off" required {% if locked %}disabled{% endif %}>
    </div>
    <button type="submit" class="btn-login" id="loginBtn" {% if locked %}disabled{% endif %}>
      {% if locked %}⚠️ ACCESS LOCKED{% else %}AUTHENTICATE →{% endif %}
    </button>
  </form>

  <div class="security-note">
    <span>🛡️</span>
    <span>RATE LIMITED · CHATID VERIFIED · IP LOGGED</span>
  </div>
</div>
<script>
document.getElementById('loginForm')?.addEventListener('submit',function(){
  const btn=document.getElementById('loginBtn');
  btn.disabled=true;btn.textContent='AUTHENTICATING…';
});
</script>
</body>
</html>
